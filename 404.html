<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | 404 Error | Alex Does Digital</title>
    <!-- Netlify _redirects handles proper 301 redirects -->
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 2rem;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--color-accent-cyan), var(--color-accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .error-message {
            font-size: 1.5rem;
            color: var(--color-text-dark);
            margin-bottom: 2rem;
        }

        .redirect-text {
            color: var(--color-text-muted);
            font-size: 1rem;
        }
    </style>
    <link rel="canonical" href="https://alxdoesdigital.com/404">
    <meta property="og:title" content="Page Not Found | 404 Error | Alex Does Digital">
    <meta property="og:description" content="The page you're looking for doesn't exist. Return to our homepage to find what you need.">
    <meta property="og:url" content="https://alxdoesdigital.com/404">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://alxdoesdigital.com/og-image.jpg">
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Page Not Found | 404 Error | Alex Does Digital">
    <meta property="twitter:description" content="The page you're looking for doesn't exist. Return to our homepage to find what you need.">
</head>

<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-message">Oops! The page you're looking for doesn't exist.</h1>
        <p class="redirect-text">Redirecting you to the homepage in a moment...</p>
        <div style="margin-top: 2rem;">
            <a href="index" class="btn btn-primary">Go to Homepage Now</a>
        </div>
    </div>

    <script>
        // Fallback JavaScript redirect
        setTimeout(function () {
            window.location.href = "index.html";
        }, 3000);
    </script>
</body>

</html>
